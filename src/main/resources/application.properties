# ========================================
# REGISTRATION & ROLES
# ========================================
system.registration.mode=OPEN
system.default.role=PLAYER
system.admin.role=ADMIN
system.roles.available=UNREG,PLAYER,ADMIN,SUPERADMIN
system.approval.required=true
system.pending.status=PENDING
system.active.status=ACTIVE
system.suspended.status=SUSPENDED

# ========================================
# EMAIL CONFIGURATION
# ========================================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:takamarthur3@gmail.com}
spring.mail.password=${MAIL_PASSWORD:ycspkkjedltlagkz}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ========================================
# FILE UPLOAD
# ========================================
file.upload-dir=uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.web.resources.static-locations=file:///H:/END OF YEAR PROJECT/Job_Portail_App/uploads/

# ========================================
# REDIS & CACHE
# ========================================
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.timeout=2000
spring.data.redis.client-type=lettuce
spring.redis.lettuce.shutdown-timeout=100ms

# ========================================
# SWAGGER / API DOCS
# ========================================
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.display-request-duration=true
springdoc.swagger-ui.doc-expansion=none
springdoc.swagger-ui.filter=true
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha
springdoc.packages-to-scan=com.example.security
springdoc.paths-to-match=/api/v1/**,/api/test/**

# ========================================
# ACTUATOR / HEALTH
# ========================================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.health.redis.enabled=false
management.health.mail.enabled=false
management.metrics.tags.application=${spring.application.name}
management.metrics.tags.environment=dev
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.export.prometheus.enabled=true

# ========================================
# LOGGING
# ========================================
logging.level.root=INFO
logging.level.com.example.security=DEBUG
logging.level.com.example.security.auth=DEBUG
logging.level.com.example.security.ratelimit=TRACE
logging.level.com.example.security.config=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.cache=TRACE
logging.level.org.springframework.data.redis=DEBUG
logging.level.org.springframework.cache.interceptor=TRACE
logging.level.org.springframework.security=DEBUG
logging.file.name=logs/application.log
logging.file.max-size=10MB
logging.file.max-history=30
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n

# ========================================
# MISC
# ========================================
spring.aop.proxy-target-class=true

