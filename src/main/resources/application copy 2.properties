# ========================================
# APPLICATION INFO
# ========================================
spring.application.name=security
server.port=8088

# ========================================
# DATABASE CONFIGURATION
# ========================================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.hikari.maximum-pool-size=5

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ========================================
# SECURITY & JWT CONFIGURATION
# ========================================
jwt.access.secret=${JWT_ACCESS_SECRET}
jwt.access.expiration=${JWT_ACCESS_EXPIRATION}
jwt.refresh.secret=${JWT_REFRESH_SECRET}
jwt.refresh.expiration=${JWT_REFRESH_EXPIRATION}

# ========================================
# REGISTRATION & ROLES
# ========================================
system.registration.mode=OPEN
system.default.role=ROLE_1
system.admin.role=ADMIN
system.roles.available=ROLE_1,ROLE_2,ROLE_3,ROLE_4,ROLE_5

# User Status
system.approval.required=true
system.pending.status=PENDING
system.active.status=ACTIVE
system.suspended.status=SUSPENDED

# ========================================
# EMAIL CONFIGURATION
# ========================================
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ========================================
# FILE UPLOAD
# ========================================
spring.web.resources.static-locations=file:///H:/END OF YEAR PROJECT/Job_Portail_App/uploads/

# ========================================
# REDIS & CACHE CONFIGURATION
# ========================================
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.timeout=2000
spring.data.redis.client-type=lettuce
spring.redis.lettuce.shutdown-timeout=100ms

# ========================================
# SWAGGER/API DOCUMENTATION
# ========================================
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.display-request-duration=true
springdoc.swagger-ui.doc-expansion=none
springdoc.swagger-ui.filter=true
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha
springdoc.api-docs.path=/v3/api-docs
springdoc.packages-to-scan=com.example.security
springdoc.paths-to-match=/api/v1/**,/api/test/**

# ========================================
# ACTUATOR / HEALTH CHECKS & METRICS
# ========================================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.health.redis.enabled=false

# Micrometer Metrics Configuration
management.metrics.tags.application=${spring.application.name}
management.metrics.tags.environment=${ENVIRONMENT:dev}
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.export.prometheus.enabled=true

# ========================================
# LOGGING CONFIGURATION
# ========================================
logging.level.root=INFO
logging.level.com.example.security=DEBUG
logging.level.com.example.security.auth=DEBUG
logging.level.com.example.security.ratelimit=TRACE
logging.level.com.example.security.config=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.cache=TRACE
logging.level.org.springframework.data.redis=DEBUG
logging.level.org.springframework.cache.interceptor=TRACE
logging.level.org.springframework.security=DEBUG

# File output
logging.file.name=logs/application.log
logging.file.max-size=10MB
logging.file.max-history=30

# Log pattern for console
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n

# Log pattern for file
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n

# ========================================
# MISC
# ========================================
spring.aop.proxy-target-class=true